<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows System Check</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}
.header-left { display: flex; flex-direction: column; gap: 3px; }
h1 { font-size: 1.25rem; font-weight: 600; color: #58a6ff; letter-spacing: .3px; }
.sysinfo { font-size: 0.72rem; color: #484f58; letter-spacing: .2px; }
.llminfo { font-size: 0.72rem; color: #484f58; letter-spacing: .2px; }
.llminfo .dot-online  { color: #3fb950; }
.llminfo .dot-offline { color: #f85149; }

.header-right { display: flex; align-items: center; gap: 12px; }
.range-label { font-size: 0.75rem; color: #8b949e; white-space: nowrap; }
#preset-select {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 5px 11px;
    border-radius: 5px;
    font-size: 0.75rem;
    cursor: pointer;
    outline: none;
}
#preset-select:focus { border-color: #388bfd; }
#preset-select:disabled { opacity: .4; cursor: not-allowed; }

#btn-start {
    background: #238636;
    color: #fff;
    border: 1px solid #2ea043;
    padding: 9px 22px;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: .5px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
}
#btn-start:hover:not(:disabled) { background: #2ea043; }
#btn-start:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }

#status-bar {
    padding: 7px 28px;
    font-size: 0.76rem;
    color: #8b949e;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
    min-height: 29px;
    transition: color .2s;
}

.grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 28px;
    max-width: 860px;
    margin: 0 auto;
}

.card { border-bottom: 1px solid #21262d; }
.card:last-child { border-bottom: none; }

.card-header {
    padding: 10px 4px 10px 12px;
    display: flex;
    align-items: center;
    gap: 9px;
    border-left: 3px solid #30363d;
    cursor: pointer;
    user-select: none;
    transition: border-left-color .3s;
}
.card-header:hover { background: rgba(255,255,255,.03); }

.card.analyzing .card-header { border-left-color: #d29922; }
.card.clean     .card-header { border-left-color: #3fb950; }
.card.critical  .card-header { border-left-color: #f85149; }
.card.high      .card-header { border-left-color: #bd561d; }
.card.medium    .card-header { border-left-color: #d29922; }
.card.low       .card-header { border-left-color: #388bfd; }
.card.llm-error .card-header { border-left-color: #8b5cf6; }

.chevron { font-size: 0.65rem; color: #484f58; transition: transform .2s; margin-left: 2px; }
.card.collapsed .chevron { transform: rotate(-90deg); }
.card.collapsed .card-body { display: none; }

@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.25; } }

.card-title {
    font-size: 0.88rem; font-weight: 600; flex: 1;
    color: #8b949e;
    transition: color .3s;
}
.card.analyzing .card-title { color: #d29922; animation: blink 1.1s ease-in-out infinite; }
.card.clean     .card-title { color: #3fb950; }
.card.critical  .card-title { color: #f85149; }
.card.high      .card-title { color: #bd561d; }
.card.medium    .card-title { color: #d29922; }
.card.low       .card-title { color: #e6edf3; }
.card.llm-error .card-title { color: #8b5cf6; }

.card-status { font-size: 0.72rem; color: #484f58; white-space: nowrap; }
.card.analyzing .card-status { color: #d29922; }
.card.clean     .card-status { color: #3fb950; }
.card.critical  .card-status { color: #f85149; }
.card.high      .card-status { color: #bd561d; }
.card.medium    .card-status { color: #d29922; }
.card.low       .card-status { color: #388bfd; }

.card-body { padding: 8px 0 14px 15px; }
.card-body:empty::after { content: "Waiting…"; color: #30363d; font-size: 0.78rem; font-style: italic; }
.card.collapsed .card-body:empty::after { display: none; }

.issue {
    background: #161b22;
    border-radius: 4px;
    padding: 10px 13px;
    margin-bottom: 8px;
    border-left: 3px solid #30363d;
}
.issue:last-child { margin-bottom: 0; }
.issue.old { opacity: 0.45; }
.issue.CRITICAL { border-left-color: #f85149; }
.issue.HIGH     { border-left-color: #bd561d; }
.issue.MEDIUM   { border-left-color: #d29922; }
.issue.LOW      { border-left-color: #388bfd; }

.issue-top  { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.issue-name { font-size: 0.85rem; font-weight: 600; color: #e6edf3; }
.sev-badge  {
    font-size: 0.63rem; font-weight: 700; letter-spacing: .5px;
    padding: 2px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
}
.sev-CRITICAL { background: #3d0f0f; color: #f85149; }
.sev-HIGH     { background: #3d1f0f; color: #e0734a; }
.sev-MEDIUM   { background: #3d330f; color: #d29922; }
.sev-LOW      { background: #0f1f3d; color: #388bfd; }

.issue-meta   { font-size: 0.73rem; color: #484f58; line-height: 1.4; margin-bottom: 6px; }
.issue-time   { font-size: 0.68rem; color: #484f58; margin-left: auto; white-space: nowrap; }
.issue-desc   { font-size: 0.82rem; color: #c9d1d9; line-height: 1.5; margin-bottom: 5px; }
.issue-action { font-size: 0.78rem; color: #58a6ff; line-height: 1.4; }
.issue-action::before { content: "→ "; }

.clean-msg { color: #3fb950; font-size: 0.82rem; padding: 4px 0; }
.error-msg { color: #8b5cf6; font-size: 0.82rem; padding: 4px 0; white-space: pre-wrap; word-break: break-word; }

.ask-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.ask-btn {
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.71rem;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
}
.ask-btn:hover:not(:disabled) { background: #30363d; color: #c9d1d9; border-color: #484f58; }
.ask-btn:disabled { opacity: .4; cursor: not-allowed; }
.ask-btn-info   { border-color: #1f4a7a; color: #58a6ff; }
.ask-btn-info:hover:not(:disabled)   { background: #0d2137; border-color: #388bfd; color: #79b8ff; }
.ask-btn-warn   { border-color: #5a3e10; color: #d29922; }
.ask-btn-warn:hover:not(:disabled)   { background: #1f1500; border-color: #d29922; color: #e3b341; }
.ask-btn-action { border-color: #1a4a28; color: #3fb950; }
.ask-btn-action:hover:not(:disabled) { background: #051c0c; border-color: #3fb950; color: #56d364; }

.ai-response {
    display: none;
    margin-top: 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-left: 3px solid #58a6ff;
    border-radius: 4px;
    padding: 10px 13px;
    font-size: 0.82rem;
    color: #c9d1d9;
    line-height: 1.6;
}
.ai-response.visible { display: block; }
.ai-response.loading { color: #484f58; font-style: italic; }
.ai-response p  { margin: 0 0 8px; }
.ai-response p:last-child { margin-bottom: 0; }
.ai-response ul { margin: 4px 0 8px 18px; }
.ai-response li { margin-bottom: 3px; }

.ask-editor {
    display: none;
    margin-top: 8px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 8px 10px;
}
.ask-editor.visible { display: block; }
.ask-input {
    width: 100%;
    background: #0d1117;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 0.82rem;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    outline: none;
}
.ask-input:focus { border-color: #388bfd; }
.ask-input::placeholder { color: #484f58; }
.ask-editor-row { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
.ask-submit {
    background: #1f6feb;
    color: #fff;
    border: 1px solid #388bfd;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
}
.ask-submit:hover:not(:disabled) { background: #388bfd; }
.ask-submit:disabled { opacity: .4; cursor: not-allowed; }
.ask-cancel {
    background: transparent;
    color: #8b949e;
    border: 1px solid #30363d;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: color .15s, border-color .15s;
}
.ask-cancel:hover { color: #c9d1d9; border-color: #484f58; }
.ask-hint { font-size: 0.65rem; color: #484f58; margin-left: 2px; }

.note {
    padding: 10px 28px 24px;
    font-size: 0.72rem;
    color: #484f58;
    line-height: 1.5;
}

.raw-icon {
    font-size: 0.60rem;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #30363d;
    background: transparent;
    border: 1px solid #30363d;
    padding: 1px 5px;
    border-radius: 3px;
    cursor: default;
    flex-shrink: 0;
    margin-left: auto;
    transition: color .15s, border-color .15s, background .15s;
    letter-spacing: .5px;
}
.raw-icon:hover { color: #8b949e; border-color: #484f58; background: #21262d; }

#raw-tooltip {
    position: fixed;
    z-index: 9999;
    display: none;
    background: #161b22;
    border: 1px solid #30363d;
    border-top: 2px solid #388bfd;
    border-radius: 5px;
    padding: 10px 12px;
    max-width: 560px;
    min-width: 260px;
    max-height: 360px;
    overflow: auto;
    font-size: 0.69rem;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #8b949e;
    white-space: pre-wrap;
    word-break: break-all;
    box-shadow: 0 6px 24px rgba(0,0,0,.6);
    line-height: 1.55;
    pointer-events: auto;
}
#raw-tooltip-label {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.62rem;
    color: #388bfd;
    letter-spacing: .4px;
    margin-bottom: 7px;
    display: block;
}
</style>
</head>
<body>
<header>
    <div class="header-left">
        <h1>Windows System Check</h1>
        <span class="sysinfo">{{SYSINFO}}</span>
        <span class="llminfo">{{LLMINFO}}</span>
    </div>
    <div class="header-right">
        <label class="range-label" for="preset-select">Time range</label>
        <select id="preset-select">
            <option value="-2">since wake</option>
            <option value="-1">since boot</option>
            <option value="1">24 hours</option>
            <option value="7">one week</option>
            <option value="0" selected>all</option>
        </select>
        <button id="btn-start" onclick="startCheck()">START CHECK</button>
    </div>
</header>
<div id="status-bar">Ready — click START CHECK to begin</div>
<div class="grid" id="grid"></div>
<div class="note" id="note"></div>

<div id="raw-tooltip"><span id="raw-tooltip-label">RAW OUTPUT</span><span id="raw-tooltip-content"></span></div>

<script>
const BOOT_MS = {{BOOTTIME_MS}};
const WAKE_MS = {{WAKETIME_MS}};

function timeAgo(ms) {
    const s = (Date.now() - ms) / 1000;
    if (s < 90)           return Math.round(s)        + 's ago';
    if (s < 90 * 60)      return Math.round(s / 60)   + 'm ago';
    if (s < 48 * 3600)    return Math.round(s / 3600)  + 'h ago';
    return                       Math.round(s / 86400) + 'd ago';
}

function labelOption(value, suffix) {
    const opt = document.querySelector(`#preset-select option[value="${value}"]`);
    if (opt) opt.textContent = opt.textContent + ' (' + suffix + ')';
}

function initPresetLabels() {
    labelOption('-2', timeAgo(WAKE_MS));
    labelOption('-1', timeAgo(BOOT_MS));
    labelOption('1',  timeAgo(Date.now() - 86400e3));
    labelOption('7',  timeAgo(Date.now() - 7 * 86400e3));
}

const CATEGORIES = [
    "Security", "Hardware & Power", "Core OS", "Drivers",
    "Network", "Performance", "Antivirus & Defense", "Updates & Tasks"
];

function slug(s) { return s.replace(/[^a-z0-9]+/gi, '-').toLowerCase(); }

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = CATEGORIES.map(cat => `
        <div class="card collapsed" id="card-${slug(cat)}">
            <div class="card-header" onclick="toggleCard('${slug(cat)}')">
                <span class="card-title">${esc(cat)}</span>
                <span class="card-status">Waiting</span>
                <span class="chevron">&#9660;</span>
            </div>
            <div class="card-body"></div>
        </div>`).join('');
}

function toggleCard(id) {
    const card = document.getElementById('card-' + id);
    if (card) card.classList.toggle('collapsed');
}

function setCard(cat, state, statusText, bodyHtml) {
    const card = document.getElementById('card-' + slug(cat));
    if (!card) return;
    const wasCollapsed = card.classList.contains('collapsed');
    card.className = 'card ' + state + (wasCollapsed ? ' collapsed' : '');
    card.querySelector('.card-status').textContent = statusText;
    if (bodyHtml !== undefined) {
        card.querySelector('.card-body').innerHTML = bodyHtml;
        card.classList.remove('collapsed'); // auto-expand when result arrives
    }
}

function parseIssues(text) {
    // Split on blank lines, keep blocks that look like an issue entry
    return text.split(/\n\s*\n/)
        .filter(b => /^Event:/mi.test(b))
        .map(b => {
            const get = key => { const m = b.match(new RegExp('^' + key + ':\\s*(.+)', 'mi')); return m ? m[1].trim() : ''; };
            return {
                raw:         b.trim(),
                event:       get('Event'),
                severity:    get('Severity').toUpperCase(),
                date:        get('Date'),
                source:      get('Source'),
                description: get('Description'),
                action:      get('Action')
            };
        })
        .filter(i => i.event);
}

function highestSeverity(issues) {
    if (issues.some(i => i.severity === 'CRITICAL')) return 'critical';
    if (issues.some(i => i.severity === 'HIGH'))     return 'high';
    if (issues.some(i => i.severity === 'MEDIUM'))   return 'medium';
    return 'low';
}

const SEV_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };

function isOlderThanWeek(dateStr) {
    if (!dateStr) return false;
    const m = dateStr.match(/^(.+?)\s*\(/);
    const d = new Date(m ? m[1].trim() : dateStr.trim());
    return !isNaN(d) && (Date.now() - d.getTime()) > 7 * 24 * 60 * 60 * 1000;
}

function renderIssues(text) {
    const issues = parseIssues(text);
    if (!issues.length) {
        return `<div class="issue LOW"><div class="issue-desc" style="white-space:pre-wrap;font-size:.73rem">${esc(text.trim())}</div></div>`;
    }
    issues.sort((a, b) => (SEV_ORDER[a.severity] ?? 4) - (SEV_ORDER[b.severity] ?? 4));
    return issues.map(i => `
        <div class="issue ${i.severity}${isOlderThanWeek(i.date) ? ' old' : ''}"
             data-raw="${esc(i.raw)}"
             data-event="${esc(i.event)}" data-severity="${esc(i.severity)}"
             data-date="${esc(i.date)}" data-source="${esc(i.source)}"
             data-desc="${esc(i.description)}" data-action="${esc(i.action)}">
            <div class="issue-top">
                <span class="sev-badge sev-${i.severity}">${esc(i.severity)}</span>
                <span class="issue-name">${esc(i.event)}</span>
                ${i.date ? `<span class="issue-time">${esc(i.date)}</span>` : ''}
                <span class="raw-icon" data-raw="${esc(i.raw)}"
                      onmouseenter="showRawTooltip(this)"
                      onmouseleave="scheduleHideTooltip()">{ }</span>
            </div>
            ${i.source      ? `<div class="issue-meta">${esc(i.source)}</div>` : ''}
            ${i.description ? `<div class="issue-desc">${esc(i.description)}</div>` : ''}
            ${i.action      ? `<div class="issue-action">${esc(i.action)}</div>` : ''}
            <div class="ask-btns">
                <button class="ask-btn ask-btn-info"   onclick="askLlm(this, 'In plain everyday language, what is this Windows event and what happened on my computer? No technical jargon.')">💡 What is this?</button>
                <button class="ask-btn ask-btn-warn"   onclick="askLlm(this, 'How serious is this for a typical home user? Could it affect my files, privacy, or computer stability? Be honest and direct.')">⚠ How worried should I be?</button>
                <button class="ask-btn ask-btn-action" onclick="askLlm(this, 'What is the single most important action I should take right now? Give me one clear, practical, safe next step — not a long list.')">→ What\'s my next step?</button>
                <button class="ask-btn" onclick="toggleAskEditor(this)">✎ Ask your own…</button>
            </div>
            <div class="ask-editor">
                <textarea class="ask-input" rows="2"
                    placeholder="Type your question… (Ctrl+Enter to send, Esc to cancel)"
                    onkeydown="handleAskKey(event, this)"></textarea>
                <div class="ask-editor-row">
                    <button class="ask-submit" onclick="submitCustomAsk(this)">Ask</button>
                    <button class="ask-cancel" onclick="closeAskEditor(this)">Cancel</button>
                    <span class="ask-hint">Ctrl+Enter to send</span>
                </div>
            </div>
            <div class="ai-response"></div>
        </div>`).join('');
}

function activePresetDays() {
    return document.getElementById('preset-select').value;
}

function setPresetsDisabled(on) {
    document.getElementById('preset-select').disabled = on;
}

function renderMarkdown(text) {
    // Minimal markdown: bold, bullets, paragraphs
    const escaped = esc(text.trim());
    const lines = escaped.split('\n');
    let html = '';
    let inList = false;
    for (const raw of lines) {
        const line = raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        const bullet = line.match(/^[-*]\s+(.*)/);
        if (bullet) {
            if (!inList) { html += '<ul>'; inList = true; }
            html += `<li>${bullet[1]}</li>`;
        } else {
            if (inList) { html += '</ul>'; inList = false; }
            html += line === '' ? '' : `<p>${line}</p>`;
        }
    }
    if (inList) html += '</ul>';
    return html;
}

let activeEs = null;

// ── Raw-output tooltip ────────────────────────────────────────────────────────
const rawTooltip    = document.getElementById('raw-tooltip');
const rawTooltipTxt = document.getElementById('raw-tooltip-content');
let   tooltipTimer  = null;

function showRawTooltip(icon) {
    clearTimeout(tooltipTimer);
    rawTooltipTxt.textContent = icon.dataset.raw || '(no data)';
    rawTooltip.style.display = 'block';

    const r  = icon.getBoundingClientRect();
    const tw = rawTooltip.offsetWidth;
    const th = rawTooltip.offsetHeight;
    let left = r.left;
    let top  = r.bottom + 6;
    if (left + tw > window.innerWidth  - 10) left = window.innerWidth  - tw - 10;
    if (top  + th > window.innerHeight - 10) top  = r.top - th - 6;
    rawTooltip.style.left = Math.max(6, left) + 'px';
    rawTooltip.style.top  = Math.max(6, top)  + 'px';
}

function scheduleHideTooltip() {
    tooltipTimer = setTimeout(() => { rawTooltip.style.display = 'none'; }, 150);
}

rawTooltip.addEventListener('mouseenter', () => clearTimeout(tooltipTimer));
rawTooltip.addEventListener('mouseleave', scheduleHideTooltip);
// ─────────────────────────────────────────────────────────────────────────────


function toggleAskEditor(btn) {
    const issue = btn.closest('.issue');
    const editor = issue.querySelector('.ask-editor');
    const opening = !editor.classList.contains('visible');
    editor.classList.toggle('visible', opening);
    if (opening) editor.querySelector('.ask-input').focus();
}

function closeAskEditor(btn) {
    const editor = btn.closest('.ask-editor');
    editor.classList.remove('visible');
    editor.querySelector('.ask-input').value = '';
}

function submitCustomAsk(btn) {
    const editor = btn.closest('.ask-editor');
    const question = editor.querySelector('.ask-input').value.trim();
    if (!question) return;
    closeAskEditor(btn);
    askLlm(btn, question);
}

function handleAskKey(event, textarea) {
    if (event.key === 'Enter' && event.ctrlKey) {
        event.preventDefault();
        submitCustomAsk(textarea.closest('.ask-editor').querySelector('.ask-submit'));
    } else if (event.key === 'Escape') {
        closeAskEditor(textarea.closest('.ask-editor').querySelector('.ask-cancel'));
    }
}

function askLlm(btn, question) {
    const issue = btn.closest('.issue');
    const issueText = issue.dataset.raw || '';

    document.getElementById('status-bar').textContent = 'Asking AI — please wait…';

    issue.querySelectorAll('.ask-btn').forEach(b => b.disabled = true);
    const resp = issue.querySelector('.ai-response');
    resp.innerHTML = 'Asking AI…';
    resp.className = 'ai-response loading visible';

    fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ issue: issueText, question: question })
    })
    .then(r => r.json())
    .then(data => {
        const disclaimer = '<p style="color:#f85149;font-size:0.70rem;margin-bottom:7px;">⚠ AI-generated — may be incorrect. Verify before acting on any advice.</p>';
        resp.innerHTML = disclaimer + renderMarkdown(data.text || 'No response received.');
        resp.className = 'ai-response visible';
        issue.querySelectorAll('.ask-btn').forEach(b => b.disabled = false);
        document.getElementById('status-bar').textContent = 'AI response ready';
    })
    .catch(() => {
        resp.innerHTML = '<p>Could not get a response. Please try again.</p>';
        resp.className = 'ai-response visible';
        issue.querySelectorAll('.ask-btn').forEach(b => b.disabled = false);
        document.getElementById('status-bar').textContent = 'AI request failed';
    });
}

function startCheck() {
    const btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.textContent = 'RUNNING…';
    document.getElementById('note').textContent = '';
    buildGrid();

    const days = activePresetDays();
    setPresetsDisabled(true);
    activeEs = new EventSource('/stream?days=' + days);
    const es = activeEs;
    let done = 0;

    es.onmessage = e => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'start') {
            setCard(msg.category, 'analyzing', 'Analyzing…');
            document.getElementById('status-bar').textContent = 'Analyzing: ' + msg.category;

        } else if (msg.type === 'result') {
            if (msg.clean) {
                setCard(msg.category, 'clean', 'Clean', '<div class="clean-msg">&#10003; No issues found</div>');
            } else if (msg.error) {
                setCard(msg.category, 'llm-error', 'LLM error', `<div class="error-msg">${esc(msg.text)}</div>`);
            } else {
                const issues = parseIssues(msg.text);
                const sev = issues.length ? highestSeverity(issues) : 'low';
                const label = issues.length ? issues.length + ' issue' + (issues.length > 1 ? 's' : '') : 'Issues';
                setCard(msg.category, sev, label, renderIssues(msg.text));
            }
            done++;

        } else if (msg.type === 'done') {
            activeEs = null;
            es.close();
            btn.disabled = false;
            btn.textContent = 'RUN AGAIN';
            setPresetsDisabled(false);
            const label = days == 0 ? 'all time' : days == -2 ? 'since last wake' : days == -1 ? 'since last boot' : days == 1 ? 'last 24 hours' : 'last ' + days + ' days';
            document.getElementById('status-bar').textContent = 'Check complete — ' + done + ' categories analyzed (' + label + ')';
            document.getElementById('note').textContent =
                'NOTE: Suggested actions are recommendations only and not guaranteed solutions. ' +
                'Review carefully before applying any changes to your system.';
        }
    };

    es.onerror = () => {
        activeEs = null;
        es.close();
        btn.disabled = false;
        btn.textContent = 'RETRY';
        setPresetsDisabled(false);
        document.getElementById('status-bar').textContent = 'Connection lost — is the server still running?';
    };
}

buildGrid();
initPresetLabels();
</script>
